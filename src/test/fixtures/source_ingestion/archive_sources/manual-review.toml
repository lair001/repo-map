[source]
id = "example-manual-review-artifact"
type = "manual.import"
display_name = "Example Manual Review Artifact"

[policy]
status = "manual_review_required"
max_artifact_bytes = 5242880
max_file_count = 100
max_depth = 10
symlink_policy = "do_not_follow"
hidden_files = false
retention_policy = "retain-local-path-and-hash"
requires_manual_review = true

[artifact]
path = "archive_artifacts/example-test-report"
kind = "directory"
profile = "fixture-corpus"
entry_document = "index.html"
