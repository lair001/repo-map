[source]
id = "example-saved-page-archive"
type = "saved_page.archive"
display_name = "Example Saved Page Archive"

[policy]
status = "allowed_with_limits"
max_artifact_bytes = 5242880
max_file_count = 100
max_depth = 10
symlink_policy = "do_not_follow"
hidden_files = false
retention_policy = "retain-local-path-and-hash"
requires_manual_review = false

[artifact]
path = "archive_artifacts/example-saved-page-archive"
kind = "directory"
profile = "saved-page-bundle"
entry_document = "page.html"
