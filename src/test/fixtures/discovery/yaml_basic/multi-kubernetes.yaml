apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  config_path: ./config/app.yml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  template:
    spec:
      serviceAccountName: app-service
      containers:
        - name: app
          image: example/app:1.0
          envFrom:
            - secretRef:
                name: app-secret
